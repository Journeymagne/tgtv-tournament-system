services:
  postgres:
    image: postgres:16
    container_name: kill-team-elo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: killteam
      POSTGRES_PASSWORD: killteam_dev_password
      POSTGRES_DB: kill_team_elo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U killteam -d kill_team_elo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
